name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build-lint-audit:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Env Example Audit
        run: npm run audit:env-example

      - name: Migration Manifest Verify
        run: npm run db:migrations:verify

      - name: Admin Route Guard Audit
        run: npm run audit:admin-routes

      - name: Public Render Audit
        run: npm run audit:public-rendering

      - name: Polling Discipline Audit
        run: npm run audit:polling

      - name: Release Gate (Repo)
        run: npm run release:gate -- --allow-missing-env

      - name: Build
        run: npm run build

      - name: Bundle Budget Audit
        run: npm run audit:bundle-budgets

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Audit (prod deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Upload Next Build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          include-hidden-files: true
          if-no-files-found: error

  security-unit:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build-lint-audit
    env:
      DISABLE_SECURITY_TELEMETRY_DB: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Security Unit Guardrails
        run: >
          npx playwright test
          tests/client-ip-helpers.spec.ts
          tests/security-telemetry-helpers.spec.ts
          tests/runtime-env.spec.ts
          tests/master-key-config.spec.ts
          tests/crypto-secrets.spec.ts
          tests/stripe-webhook-verify.spec.ts
          tests/key-rotation-config.spec.ts
          tests/billing-subscription-helpers.spec.ts
          tests/security-policy.spec.ts
          tests/public-runtime-config.spec.ts
          tests/viewer-shell-separation.spec.ts
          tests/office-preview-source.spec.ts
          tests/viewer-office-route-guardrails.spec.ts

  browser-a11y:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-lint-audit, security-unit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download Next Build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Axe (Playwright)
        run: npm run test:a11y:ci

  attack-sim:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-lint-audit, security-unit]
    env:
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DISABLE_SECURITY_TELEMETRY_DB: "1"
      SECURITY_TEST_NO_DB: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download Next Build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Attack Simulation
        run: npm run test:attack:ci

  billing-webhook:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-lint-audit, security-unit]
    env:
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DISABLE_SECURITY_TELEMETRY_DB: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download Next Build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Billing Webhook Integration
        run: npm run test:billing:webhook:ci

  security-state:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-lint-audit, security-unit]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DISABLE_SECURITY_TELEMETRY_DB: "1"
      NEXTAUTH_SECRET: "ci-nextauth-secret"
      AUTH_SECRET: "ci-auth-secret"
      APP_SECRET: "ci-app-secret"
      VIEW_SALT: "ci-view-salt"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download Next Build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Security State Integration
        run: npm run test:security:state:ci

      - name: Security Freeze Integration
        run: npm run test:security:freeze:ci

  lighthouse-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        run: npm run audit:lighthouse
