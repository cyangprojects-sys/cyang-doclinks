name: Bug report
description: Report a product or developer bug in the public repo
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please do not use this form for vulnerabilities or security-sensitive findings.
        Use the security disclosure path linked in the issue template chooser instead.
        This repository is under a proprietary license; please use this form for reporting issues, not for submitting code patches.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear, concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include routes, commands, or setup details if relevant.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version, deployment context, or any relevant config notes.
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Paste sanitized logs or attach screenshots if they help.
